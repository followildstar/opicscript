<body>
  <header>
    <div class="wrap title">

      <div class="toolbar">
        <button class="active" data-filter="all">All</button>

  <script>
    const data = [
      {
        set: 'set1', cat: 'mindset', title: 'Q1. Please introduce yourself.', similar: ['Tell me about yourself.', 'What kind of person are you?', 'Tell me about your daily life.', 'What are your hobbies?', 'What are you interested in these days?'], flow: ['Name and job', 'Creative hobbies', 'Healthy habits and growth', 'English goal', 'Current life attitude'], keys: 'web designer / drawing / piano / personal growth / express my thoughts', answer: `Hi, my name is Amy.

      {
        set: 'set1', cat: 'hobby', title: 'Q2. Tell me about your hobbies.', similar: ['Tell me about your favorite hobby.', 'What do you usually do in your free time?', 'Describe something you enjoy doing.', 'Tell me about a hobby you recently started or restarted.', 'What helps you relax?'], flow: ['Drawing and piano', 'Drawing expresses myself', 'Stopped because of perfectionism', 'Restarted with process mindset', 'Piano helps me relax'], keys: 'drawing / piano / perfection / process / Turkish March', answer: `I enjoy drawing and playing the piano.

      {
        set: 'set1', cat: 'hobby', title: 'Q3. What do you usually do in your free time?', similar: ['What do you usually do on weekends?', 'How do you spend your free time?', 'What do you do when you want to relax?', 'Tell me about your hobbies.', 'What do you do after work?'], flow: ['Quiet activities', 'Drawing, piano, workout, yoga', 'Writing and organizing thoughts', 'Recharge', 'Small routines feel meaningful'], keys: 'quiet activities / recharge / meaningful routines', answer: `In my free time, I usually do quiet activities.

      {
        set: 'set1', cat: 'routine', title: 'Q4. Tell me about your exercise routine.', similar: ['What do you do to stay healthy?', 'Tell me about your workout routine.', 'How often do you exercise?', 'Describe a healthy habit you have.', 'What helps you manage stress?'], flow: ['Regular exercise', 'Yoga and simple workouts', 'Body and mind', 'Proud and energetic', 'Consistency over perfection'], keys: 'regularly / yoga / mental health / consistent', answer: `I try to exercise regularly.

      {
        set: 'set1', cat: 'routine', title: 'Q5. When do you usually work out?', similar: ['What is your morning routine?', 'Why do you like mornings?', 'When are you most productive?', 'Tell me about a recent change in your routine.', 'Why do you prefer morning exercise?'], flow: ['Prefer morning', 'Difficult at first', 'Morning is consistent', 'Evening changes easily', 'Productive and confident'], keys: 'morning workout / consistent / evening variables / confidence', answer: `I usually prefer morning workouts.

At first, it was difficult because I felt tired.

      {
        set: 'set1', cat: 'mindset', title: 'Q6. Tell me about a recent change in your life.', similar: ['How have you changed recently?', 'Tell me about a change you made.', 'What changed in your mindset?', 'Describe a recent personal growth experience.', 'Tell me about something important you realized.'], flow: ['Mindset changed', 'Perfection focus before', 'Stopped what I loved', 'Now consistency and process', 'Happier and less stressed'], keys: 'mindset / perfection / consistency / process', answer: `Recently, my mindset changed a lot.

      {
        set: 'set1', cat: 'mindset', title: 'Q7. Tell me about something you recently learned.', similar: ['Tell me about an important lesson you learned.', 'What did you learn about yourself recently?', 'Describe something meaningful you realized.', 'Tell me about a personal discovery.', 'What helped you grow recently?'], flow: ['Learned about myself', 'No need to be perfect', 'Drawing and others’ opinions', 'Draw what I like', 'Creative and confident'], keys: 'not perfect / what I like / creative confidence', answer: `Recently, I learned something important about myself.

      {
        set: 'set1', cat: 'mindset', title: 'Q8. What do you do when you feel stressed?', similar: ['How do you manage stress?', 'What helps you relax?', 'What do you do when you feel overwhelmed?', 'Tell me about your stress relief habits.', 'How do you take care of yourself?'], flow: ['Take care of myself', 'Workout, piano, walk', 'Write thoughts', 'Do not avoid emotions', 'Process in healthy ways'], keys: 'stress / take care / process feelings / calmer', answer: `When I feel stressed, I try to take care of myself.

      {
        set: 'set1', cat: 'routine', title: 'Q9. Describe your daily routine.', similar: ['Tell me about your weekday routine.', 'What does a typical day look like for you?', 'What do you usually do after work?', 'Describe your lifestyle.', 'What habits are important to you?'], flow: ['Simple weekdays', 'Wake up and work', 'After work habits', 'Workout, piano, English, drawing', 'Routine gives stability'], keys: 'weekday / after work / healthy habits / stable', answer: `My weekdays are pretty simple.

      {
        set: 'set1', cat: 'routine', title: 'Q10. What do you usually do on weekends?', similar: ['How do you spend your weekends?', 'Tell me about your free time.', 'Describe a relaxing day.', 'What do you usually do when you are off work?', 'What do you enjoy doing on weekends?'], flow: ['Relax and recharge', 'Workout, piano, drawing', 'Library or quiet cafe', 'Slow mornings', 'Time with my cat'], keys: 'weekend / recharge / slow morning / cat', answer: `On weekends, I try to relax and recharge.

      {
        set: 'set1', cat: 'experience', title: 'Q11. Tell me about a memorable experience recently.', similar: ['Describe a meaningful experience.', 'Tell me about a moment that changed your perspective.', 'Tell me about a recent realization.', 'Describe a memorable moment.', 'What made you feel grateful recently?'], flow: ['Yoga experience', 'Saw someone’s hand', 'Looked at my hands', 'Felt grateful for health', 'Appreciate what I have'], keys: 'yoga / hands / health / gratitude', answer: `Recently, I had a meaningful experience during yoga.

      {
        set: 'set1', cat: 'hobby', title: 'Q12. Tell me about a hobby you stopped and restarted.', similar: ['Tell me about something you started again.', 'Describe a hobby that is important to you.', 'Why did you stop your hobby?', 'Tell me about something you changed recently.', 'Describe something you enjoy these days.'], flow: ['Drawing restarted', 'Stopped due to perfection', 'Cared about opinions', 'Started again', 'Draw for enjoyment'], keys: 'drawing / stopped / restarted / enjoy / not impress', answer: `One hobby I restarted is drawing.

      {
        set: 'set1', cat: 'mindset', title: 'Q13. What makes you happy these days?', similar: ['What do you enjoy these days?', 'What makes your life meaningful?', 'What are you grateful for these days?', 'Tell me about a recent happy moment.', 'What gives you energy these days?'], flow: ['Simple things', 'Workout, piano, drawing, English', 'Life I dreamed of', 'Gratitude', 'Enjoy present'], keys: 'simple happiness / dreamed life / present', answer: `Simple things make me happy these days.

      {
        set: 'set1', cat: 'mindset', title: 'Q14. What are your future goals?', similar: ['Tell me about your future plans.', 'What do you want to achieve?', 'What are your personal goals?', 'What kind of life do you want in the future?', 'What is important to you?'], flow: ['Healthier and creative', 'Improve English and creative skills', 'Drawing and piano', 'Meaningful balanced life', 'Enjoy process and grow'], keys: 'future goal / healthier / creative / balanced', answer: `My goal is to become healthier and more creative.

I want to keep improving my English and creative skills.

I also want to continue drawing and playing piano.

Most importantly, I want to live a meaningful and balanced life.

I want to become someone who enjoys the process and keeps growing.`},
      {
        set: 'set1', cat: 'mindset', title: 'Q15. How have you changed over time?', similar: ['Describe how you changed.', 'What kind of person were you before?', 'Tell me about personal growth.', 'How is your life different now?', 'Tell me about an important change in your life.'], flow: ['Changed a lot', 'Perfection and opinions before', 'Stress', 'Focus on myself', 'Consistency over perfection'], keys: 'changed / perfection / opinions / calmer / confident', answer: `I think I changed a lot over time.

      {
        set: 'set2', cat: 'experience', title: 'Q1. Tell me about a difficult time in your life and how you handled it.', similar: ['Tell me about a challenge you faced.', 'Describe a difficult experience.', 'Tell me about something stressful in your life.', 'How did you overcome a problem?', 'Tell me about a time you changed yourself.'], flow: ['Perfectionism was difficult', 'Stopped what I loved', 'Drawing example', 'Fear of disappointment', 'Changed mindset', 'Process and starting'], keys: 'difficult time / perfectionism / drawing / process', answer: `One difficult thing for me was dealing with perfectionism.

      {
        set: 'set2', cat: 'mindset', title: 'Q2. Tell me about something you recently realized.', similar: ['Tell me about an important realization.', 'What made you feel grateful recently?', 'Describe something meaningful you learned.', 'Tell me about a recent change in perspective.', 'What changed your mindset?'], flow: ['Realized happiness', 'Compared myself before', 'Felt behind', 'Workout changed thought', 'Dreamed life now', 'Grateful'], keys: 'realization / comparison / workout / dreamed life', answer: `Recently, I realized something important about happiness.

      {
        set: 'set2', cat: 'experience', title: 'Q3. Describe a memorable place you often go to.', similar: ['Tell me about a place you often visit.', 'Describe a place where you relax.', 'Tell me about your yoga studio.', 'What helps you manage stress?', 'Describe a meaningful place.'], flow: ['Yoga studio', 'Relax and clear mind', 'Peaceful atmosphere', 'Feel calmer after', 'New life ideas', 'Mental reset'], keys: 'yoga studio / peaceful / reset mentally', answer: `One place I often go to is my yoga studio.

      {
        set: 'set2', cat: 'routine', title: 'Q4. Tell me about a time you changed your opinion.', similar: ['Tell me about a time you changed your mind.', 'Describe a change in your routine.', 'What habit changed your life?', 'Tell me about something that surprised you.', 'What changed your perspective?'], flow: ['Changed opinion about exercise', 'Thought morning was not for me', 'Tired before', 'Tried again', 'Morning better for consistency', 'Consistency over timing'], keys: 'changed opinion / morning workout / consistency', answer: `I changed my opinion about exercise.

      {
        set: 'set2', cat: 'hobby', title: 'Q5. Tell me about something you enjoy doing alone.', similar: ['How do you spend time alone?', 'What do you usually do in your free time?', 'What helps you relax?', 'Describe an activity you enjoy.', 'What do you do when you need quiet time?'], flow: ['Enjoy alone time', 'Draw, piano, walk', 'Organize thoughts', 'Creative activities calm me', 'Discover ideas', 'Quiet time matters'], keys: 'alone time / quiet / organize thoughts / creative', answer: `I enjoy spending time alone a lot.

Usually, I draw, practice piano, or go for a walk.

      {
        set: 'set2', cat: 'routine', title: 'Q6. Describe a recent problem and how you solved it.', similar: ['Tell me about a recent challenge.', 'Describe a problem you had recently.', 'Tell me about a time something did not go as planned.', 'How did you solve a problem?', 'Tell me about a change you made.'], flow: ['Workout routine problem', 'Morning exercise first', 'Tired all day', 'Needed adjustment', 'Switched routine', 'Learned flexibility'], keys: 'problem / routine / adjust / flexibility', answer: `Recently, I struggled with my workout routine.

      {
        set: 'set2', cat: 'experience', title: 'Q7. Tell me about someone important in your life.', similar: ['Who is important to you?', 'Tell me about your family.', 'Describe someone meaningful in your life.', 'Who do you feel grateful for?', 'Tell me about someone who influenced you.'], flow: ['Parents are important', 'Appreciate them more', 'Health and life realization', 'Gratitude', 'Express love more', 'Family meaning'], keys: 'parents / gratitude / express love / family', answer: `My parents are very important to me.

      {
        set: 'set2', cat: 'routine', title: 'Q8. Tell me about something you are trying to improve.', similar: ['What are you learning these days?', 'Tell me about a skill you want to improve.', 'What do you do for self-improvement?', 'Tell me about a recent goal.', 'What is something challenging for you?'], flow: ['Improving English', 'Speak naturally and confidently', 'Practice every day', 'Listen, repeat, record', 'Consistency over talent', 'Feel improvement'], keys: 'English / natural / repeat / record / consistency', answer: `These days, I’m trying to improve my English.

      {
        set: 'set2', cat: 'routine', title: 'Q9. Tell me about a healthy habit you have.', similar: ['What do you do to stay healthy?', 'Tell me about your exercise routine.', 'Describe a healthy habit.', 'What helps you manage stress?', 'Tell me about a good habit you have.'], flow: ['Regular exercise', 'Body and mind', 'Confidence and focus', 'Manage stress', 'Stay consistent', 'Habits change life'], keys: 'healthy habit / exercise / stress / consistency', answer: `One healthy habit I’m trying to keep is regular exercise.

I realized exercise affects both my body and mind.

      {
        set: 'set2', cat: 'mindset', title: 'Q10. Tell me about something that changed your perspective.', similar: ['Tell me about a realization you had.', 'Describe something that changed the way you think.', 'Tell me about a moment of growth.', 'What helped you become more confident?', 'Tell me about something meaningful you learned.'], flow: ['Drawing changed perspective', 'Thought style was wrong', 'Softer, prettier drawings', 'Thought lack of skill', 'Realized interpretation', 'More confidence'], keys: 'drawing / perspective / interpretation / confidence', answer: `Drawing changed my perspective recently.

      {
        set: 'set2', cat: 'experience', title: 'Q11. Describe a recent activity you enjoyed.', similar: ['Tell me about something fun you did recently.', 'Describe a hobby you enjoy.', 'Tell me about a meaningful experience.', 'What do you enjoy doing in your free time?', 'Describe a memorable activity.'], flow: ['Piano practice', 'Rented grand piano room', 'Compared myself at first', 'Realized I work hard too', 'Piano recharges me', 'Meaningful experience'], keys: 'piano / grand piano / comparison / recharge', answer: `Recently, I enjoyed practicing piano.

      {
        set: 'set2', cat: 'mindset', title: 'Q12. Tell me about a personal goal you have.', similar: ['Tell me about your future goals.', 'What kind of life do you want?', 'What are you trying to improve?', 'Describe something important to you.', 'What motivates you these days?'], flow: ['Healthier and balanced', 'Body and mind', 'Regular workout and routines', 'Creative hobbies', 'Growth means happier little by little'], keys: 'personal goal / balanced / body and mind / growth', answer: `One of my personal goals is becoming healthier and more balanced.

      {
        set: 'set2', cat: 'mindset', title: 'Q13. Describe something you learned from experience.', similar: ['Tell me about an important lesson you learned.', 'Describe something experience taught you.', 'Tell me about a recent realization.', 'What changed the way you think?', 'Tell me about personal growth.'], flow: ['Planning is not enough', 'Too much thinking before', 'Action is important', 'Start before ready', 'Reality feels real', 'Changed approach'], keys: 'planning / action / start / before ready', answer: `I learned that planning alone is not enough.

      {
        set: 'set2', cat: 'experience', title: 'Q14. Tell me about a time you felt proud of yourself.', similar: ['Describe something you achieved.', 'Tell me about a proud moment.', 'What made you feel confident recently?', 'Tell me about a personal success.', 'Describe a meaningful accomplishment.'], flow: ['Proud after exercise consistency', 'Difficult at first', 'Positive changes', 'More energy and confidence', 'Trusted myself', 'Proud feeling'], keys: 'proud / exercise / consistency / self-trust', answer: `Recently, I felt proud after staying consistent with exercise.

      {
        set: 'set2', cat: 'mindset', title: 'Q15. What kind of person do you want to become?', similar: ['What kind of future do you want?', 'Tell me about your values.', 'What is important to you in life?', 'What are your personal goals?', 'Describe the person you want to become.'], flow: ['Calm, healthy, creative', 'Express through art', 'Speak thoughtfully', 'Words have meaning', 'Enjoy life and grow'], keys: 'calm / healthy / creative / thoughtful / grow', answer: `I want to become someone calm, healthy, and creative.

I want to express myself through drawing, piano, and writing.

    ];
    const cards = document.getElementById('cards');
    function render(filter = 'all') {
      cards.innerHTML = '';
      data.filter(d => filter === 'all' || d.set === filter || d.cat === filter).forEach((d, i) => {
        const el = document.createElement('article');
        el.className = 'card';
        el.dataset.set = d.set; el.dataset.cat = d.cat;
        el.innerHTML = `<div class="meta"><span>${d.set.toUpperCase()} · ${d.cat}</span><span>${i + 1}</span></div>
      <h3 class="q">${d.title}
       ${d.similar ? `<details class="similar-details"><summary>💬</summary><ul class="similar-list">${d.similar.map(s => `<li>${s}</li>`).join('')}</ul></details>` : ''}
      </h3>
     
      <div class="flow">${d.flow.map((s, idx) => `<div class="step"><span class="num">${idx + 1}</span><span>${s}</span></div>`).join('')}</div>
      <div class="key"><b>Key:</b> ${d.keys}</div>
      
      <details><summary>Full answer</summary><div class="answer">${d.answer}</div></details>`;
        cards.appendChild(el);
      });
      if (document.body.classList.contains('flow-mode')) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('flow-only'));
      }
    }
    render();
    document.querySelectorAll('.toolbar button[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toolbar button[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); render(btn.dataset.filter);
      });
    });
    document.getElementById('flowOnly').addEventListener('click', () => {
      document.body.classList.toggle('flow-mode');
      const on = document.body.classList.contains('flow-mode');
      document.querySelectorAll('.card').forEach(c => c.classList.toggle('flow-only', on));
      document.getElementById('flowOnly').classList.toggle('active', on);
      if (on) { document.querySelectorAll('details').forEach(d => d.open = false); }
    });
    document.getElementById('randomBtn').addEventListener('click', () => {
      const visible = [...document.querySelectorAll('.card')];
      if (!visible.length) return;
      document.querySelectorAll('.random-focus').forEach(c => c.classList.remove('random-focus'));
      const pick = visible[Math.floor(Math.random() * visible.length)];
      pick.classList.add('random-focus');
      pick.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    document.getElementById('collapse').addEventListener('click', () => {
      document.querySelectorAll('details').forEach(d => d.open = false);
    });
  </script>
</body> 

</html>
